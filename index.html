<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Name | Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Hi, I'm Your Name</h1>
  <p>Aspiring cloud engineer. This site is hosted on AWS S3 + CloudFront.</p>
  <p>Check out my <a href="https://github.com/yourusername">GitHub</a>.</p>

  <h2>Contact Me</h2>
  <form id="contactForm">
    <input type="text" id="name" placeholder="Your name" required><br><br>
    <input type="email" id="email" placeholder="Your email" required><br><br>
    <textarea id="message" placeholder="Your message" required></textarea><br><br>
    <button type="submit">Send</button>
  </form>
  <p id="formStatus"></p>

  <script>
    const API_URL = "https://fd46o1l1yd.execute-api.us-east-1.amazonaws.com/contact";

    document.getElementById("contactForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const status = document.getElementById("formStatus");
      status.textContent = "Sending...";

      const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        status.textContent = data.message || "Sent!";
        document.getElementById("contactForm").reset();
      } catch (err) {
        status.textContent = "Something went wrong. Please try again.";
      }
    });
  </script>
</body>
</html>
